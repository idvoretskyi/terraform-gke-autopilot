name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ~1.6

    - name: Validate Terraform
      run: |
        terraform fmt -check -recursive .
        terraform init -backend=false
        terraform validate
        terraform -chdir=modules/gke-autopilot init -backend=false
        terraform -chdir=modules/gke-autopilot validate

    - name: Generate changelog
      id: changelog
      run: |
        PREVIOUS_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
        if [ -z "$PREVIOUS_TAG" ]; then
          PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
        fi

        echo "## Changes" > CHANGELOG.md
        git log --pretty=format:"- %s" "${PREVIOUS_TAG}..HEAD" >> CHANGELOG.md

        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        cat CHANGELOG.md >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          # Terraform GKE Autopilot ${{ github.ref_name }}

          ${{ steps.changelog.outputs.changelog }}

          ## Usage

          ```hcl
          module "gke_autopilot" {
            source = "github.com/idvoretskyi/terraform-gke-autopilot//modules/gke-autopilot?ref=${{ github.ref_name }}"

            cluster_name        = "my-cluster"
            environment         = "prod"
            cost_center         = "engineering"
            release_channel     = "REGULAR"
            deletion_protection = true
            logging_components    = ["SYSTEM_COMPONENTS"]
            monitoring_components = ["SYSTEM_COMPONENTS"]
          }
          ```
        draft: false
        prerelease: false
